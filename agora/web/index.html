<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agora</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #c8c8d4;
    --text-dim: #6e6e82;
    --accent: #7c6ff0;
    --accent-dim: #4a3fb0;
    --green: #4ec48c;
    --red: #e05c6c;
    --orange: #e0a04c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── Layout ─────────────────────────── */
  .app { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; height: 100vh; }
  header {
    grid-column: 1 / -1;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 2px; color: var(--accent); }
  header .tagline { color: var(--text-dim); font-size: 12px; }
  .left-panel { border-right: 1px solid var(--border); overflow-y: auto; }
  .right-panel { overflow-y: auto; display: flex; flex-direction: column; }

  /* ── Sections ───────────────────────── */
  .section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* ── Code & Constraints ─────────────── */
  .constraint-list { list-style: none; }
  .constraint-item {
    padding: 8px 12px;
    margin-bottom: 6px;
    background: var(--surface);
    border-radius: 6px;
    border-left: 3px solid var(--accent);
    font-size: 12px;
  }
  .constraint-item .kind {
    color: var(--accent);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .constraint-item .text { margin-top: 4px; color: var(--text); }
  .constraint-item .ns { color: var(--text-dim); font-size: 11px; }

  .proposal-item {
    padding: 8px 12px;
    margin-bottom: 6px;
    background: var(--surface);
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .proposal-item .id { color: var(--text-dim); font-size: 11px; font-family: monospace; }
  .status { padding: 2px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .status.merged { background: rgba(78, 196, 140, 0.15); color: var(--green); }
  .status.pending { background: rgba(224, 160, 76, 0.15); color: var(--orange); }
  .status.rejected { background: rgba(224, 92, 108, 0.15); color: var(--red); }

  .history-item {
    padding: 8px 12px;
    margin-bottom: 6px;
    background: var(--surface);
    border-radius: 6px;
  }
  .history-item .reason { color: var(--text); }
  .history-item .hash { color: var(--text-dim); font-size: 11px; font-family: monospace; }
  .history-item .fn-name { color: var(--accent); font-weight: 600; }

  /* ── Chat (Human Community) ─────────── */
  .chat-area { flex: 1; display: flex; flex-direction: column; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .chat-msg {
    margin-bottom: 12px;
    padding: 8px 12px;
    background: var(--surface);
    border-radius: 8px;
  }
  .chat-msg .author { color: var(--accent); font-weight: 600; font-size: 12px; }
  .chat-msg .time { color: var(--text-dim); font-size: 10px; margin-left: 8px; }
  .chat-msg .body { margin-top: 4px; color: var(--text); white-space: pre-wrap; }
  .chat-input {
    display: flex;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    gap: 8px;
  }
  .chat-input input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  .chat-input input[type="text"]:focus { border-color: var(--accent); }
  .chat-input button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  .chat-input button:hover { background: var(--accent-dim); }

  .empty { color: var(--text-dim); font-style: italic; font-size: 12px; }

  /* ── Tabs ────────────────────────────── */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 20px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>AGORA</h1>
      <div class="tagline">one community, one roof &mdash; humans and AI, together</div>
    </div>
    <div style="color: var(--text-dim); font-size: 11px;">
      <span id="status-dot" style="color: var(--green);">&#9679;</span>
      <span id="status-text">connecting...</span>
    </div>
  </header>

  <!-- Left: AI's world — code, constraints, proofs -->
  <div class="left-panel">
    <div class="tabs">
      <div class="tab active" data-tab="constraints">Constraints</div>
      <div class="tab" data-tab="proposals">Proposals</div>
      <div class="tab" data-tab="history">History</div>
    </div>

    <div id="tab-constraints" class="tab-content active">
      <div class="section">
        <div class="section-title">Verified Constraints</div>
        <ul class="constraint-list" id="constraint-list"></ul>
      </div>
    </div>

    <div id="tab-proposals" class="tab-content">
      <div class="section">
        <div class="section-title">Recent Proposals</div>
        <div id="proposal-list"></div>
      </div>
    </div>

    <div id="tab-history" class="tab-content">
      <div class="section">
        <div class="section-title">Constraint Transitions</div>
        <div id="history-list"></div>
      </div>
    </div>
  </div>

  <!-- Right: Human's world — community, discussion -->
  <div class="right-panel">
    <div class="section">
      <div class="section-title">Community</div>
    </div>
    <div class="chat-area">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input">
        <input type="text" id="chat-author" placeholder="your name" style="max-width: 120px;">
        <input type="text" id="chat-message" placeholder="say something...">
        <button onclick="sendChat()">send</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin + '/api';

// ── Tabs ─────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ── Data Loading ─────────────────────
async function loadConstraints() {
  try {
    const res = await fetch(API + '/constraints');
    const data = await res.json();
    const list = document.getElementById('constraint-list');
    if (!data.length) { list.innerHTML = '<li class="empty">no constraints yet</li>'; return; }
    list.innerHTML = data.map(c => `
      <li class="constraint-item">
        <div class="kind">${c.kind || 'constraint'}</div>
        <div class="text">${c.constraint_text}</div>
        <div class="ns">${c.namespace}</div>
      </li>
    `).join('');
  } catch(e) { console.error('load constraints:', e); }
}

async function loadProposals() {
  try {
    const res = await fetch(API + '/proposals');
    const data = await res.json();
    const list = document.getElementById('proposal-list');
    if (!data.length) { list.innerHTML = '<div class="empty">no proposals yet</div>'; return; }
    list.innerHTML = data.map(p => `
      <div class="proposal-item">
        <div>
          <div class="id">${(p.id || '').substring(0, 16)}...</div>
          <div style="color: var(--text-dim); font-size: 11px;">${p.namespace}</div>
        </div>
        <span class="status ${p.status}">${p.status}</span>
      </div>
    `).join('');
  } catch(e) { console.error('load proposals:', e); }
}

async function loadHistory() {
  try {
    const res = await fetch(API + '/history');
    const data = await res.json();
    const list = document.getElementById('history-list');
    if (!data.length) { list.innerHTML = '<div class="empty">no history yet</div>'; return; }
    list.innerHTML = data.map(h => `
      <div class="history-item">
        <div class="fn-name">${h.fn_name || '?'}</div>
        <div class="reason">${h.reason}</div>
        <div class="hash">${(h.old_hash || 'none').substring(0, 12)} &rarr; ${(h.new_hash || '').substring(0, 12)}</div>
      </div>
    `).join('');
  } catch(e) { console.error('load history:', e); }
}

async function loadChat() {
  try {
    const res = await fetch(API + '/chat');
    const data = await res.json();
    const container = document.getElementById('chat-messages');
    if (!data.length) {
      container.innerHTML = '<div class="empty">no messages yet. say hello.</div>';
      return;
    }
    const reversed = [...data].reverse();
    container.innerHTML = reversed.map(m => {
      const date = new Date(parseInt(m.created_at) * 1000);
      const time = date.toLocaleTimeString();
      return `
        <div class="chat-msg">
          <span class="author">${m.author}</span>
          <span class="time">${time}</span>
          <div class="body">${escapeHtml(m.message)}</div>
        </div>
      `;
    }).join('');
    container.scrollTop = container.scrollHeight;
  } catch(e) { console.error('load chat:', e); }
}

async function sendChat() {
  const author = document.getElementById('chat-author').value.trim() || 'anonymous';
  const message = document.getElementById('chat-message').value.trim();
  if (!message) return;
  try {
    await fetch(API + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ author, message })
    });
    document.getElementById('chat-message').value = '';
    loadChat();
  } catch(e) { console.error('send chat:', e); }
}

document.getElementById('chat-message').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendChat();
});

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init & Polling ───────────────────
async function refresh() {
  await Promise.all([loadConstraints(), loadProposals(), loadHistory(), loadChat()]);
  document.getElementById('status-text').textContent = 'live';
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
